<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Best Cars Miami</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

/* ===== BODY ===== */

body{
margin:0;
font-family:Arial;
color:white;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
url("ChatGPT Image 20 may 2026, 17_26_46.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* ===== HEADER ===== */

header{
padding:30px;
text-align:center;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.35);
box-shadow:0 0 30px rgba(0,255,255,0.15);
border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
display:flex;
justify-content:center;
align-items:center;
gap:20px;

font-size:65px;
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;

background:linear-gradient(90deg,#00e5ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(0,255,255,0.9),
0 0 20px rgba(0,255,255,0.7),
0 0 40px rgba(0,255,255,0.5);

font-family:Arial Black,sans-serif;
}

.logo{
width:90px;
height:90px;
object-fit:contain;
border-radius:14px;
box-shadow:0 0 35px rgba(0,255,255,0.5);
}

/* ===== SEARCH ===== */

.controls{
padding:25px;
text-align:center;
}

input{
padding:15px;
border:none;
border-radius:14px;
width:80%;
max-width:420px;

background:rgba(0,0,0,0.45);
color:white;
font-size:16px;
outline:none;

box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* ===== FILE INPUT ===== */

input[type="file"]{
background:#111827;
padding:12px;
cursor:pointer;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:30px;
max-width:1400px;
margin:auto;
}

/* ===== CARD ===== */

.card{
background:rgba(17,24,39,0.88);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
margin:0;
font-size:24px;
}

.price{
color:#00ff99;
font-size:24px;
font-weight:bold;
margin-top:10px;
}

/* ===== MODAL ===== */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
overflow:auto;
z-index:999;
}

.modal-content{
background:#111827;
margin:40px auto;
padding:20px;
width:90%;
max-width:900px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,255,255,0.2);
}

.close{
float:right;
font-size:30px;
cursor:pointer;
color:red;
}

.slider img{
width:100%;
margin-top:15px;
border-radius:14px;
}

/* ===== BUTTONS ===== */

.btn{
display:block;
text-align:center;
padding:14px;
border-radius:12px;
margin-top:12px;
text-decoration:none;
color:white;
cursor:pointer;
border:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

.whatsapp{
background:#25D366;
}

.edit{
background:#1e88e5;
}

.delete{
background:#e53935;
}

.add{
background:#ff9800;
}

/* ===== ADMIN ===== */

#adminPanel{
display:none;
position:fixed;
bottom:20px;
right:20px;

background:rgba(0,0,0,0.95);
padding:20px;
border-radius:18px;
width:320px;

z-index:1000;

box-shadow:0 0 30px rgba(0,255,255,0.25);
}

#adminPanel input{
width:100%;
margin-bottom:10px;
}

/* ===== MOBILE ===== */

@media(max-width:700px){

header h1{
font-size:38px;
flex-direction:column;
}

.logo{
width:70px;
height:70px;
}

}

</style>
</head>

<body>

<header>

<h1 id="secret">

<img src="logo.png" class="logo">

THE BEST CARS MIAMI

</h1>

</header>

<div class="controls">

<input
id="search"
placeholder="Buscar carro..."
onkeyup="render()">

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="modalBody"></div>

</div>
</div>

<!-- ADMIN -->

<div id="adminPanel">

<h2>🔒 Admin Panel</h2>

<input id="name" placeholder="Nombre">

<input id="price" placeholder="Precio">

<input id="year" placeholder="Año">

<input type="file" id="fileUpload" multiple>

<button class="btn add" onclick="saveCar()">
Guardar Carro
</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove,
update
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getStorage,
ref as sRef,
uploadBytes,
getDownloadURL
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* ===== FIREBASE ===== */

const firebaseConfig = {

apiKey: "AIzaSyB7yKOWqufXFKD7j_QOLXazwJ3T4rL5fkE",

authDomain: "thebestcars-miami.firebaseapp.com",

databaseURL: "https://thebestcars-miami-default-rtdb.firebaseio.com",

projectId: "thebestcars-miami",

storageBucket: "thebestcars-miami.firebasestorage.app",

messagingSenderId: "323195561825",

appId: "1:323195561825:web:f48bc075e99ba152c40720",

measurementId: "G-G4MN1SBMT6"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

let cars = [];
let currentKeys = [];
let editKey = null;

const carsRef = ref(db,"cars");

/* ===== LOAD ===== */

onValue(carsRef,(snapshot)=>{

cars = [];
currentKeys = [];

snapshot.forEach(child=>{

cars.push(child.val());
currentKeys.push(child.key);

});

render();

});

/* ===== RENDER ===== */

window.render = function(){

let grid = document.getElementById("grid");

let search =
document.getElementById("search")
.value
.toLowerCase();

grid.innerHTML = "";

cars
.filter(car=>
car.name.toLowerCase().includes(search)
)

.forEach((car,i)=>{

grid.innerHTML += `

<div class="card" onclick="openCar(${i})">

<img src="${car.imgs[0]}">

<div class="info">

<h3>${car.name}</h3>

<p>Año: ${car.year}</p>

<p class="price">$${car.price}</p>

</div>

</div>

`;

});

}

/* ===== OPEN ===== */

window.openCar = function(i){

let car = cars[i];

let imgs = car.imgs
.map(img=>`<img src="${img}">`)
.join("");

document.getElementById("modalBody").innerHTML = `

<h2>${car.name}</h2>

<p class="price">$${car.price}</p>

<p>Año: ${car.year}</p>

<div class="slider">

${imgs}

</div>

<a class="btn whatsapp"
href="https://wa.me/13050000000">

WhatsApp

</a>

<button class="btn edit"
onclick="editCar(${i})">

✏ Editar

</button>

<button class="btn delete"
onclick="deleteCar(${i})">

🗑 Borrar

</button>

`;

document.getElementById("modal").style.display="block";

}

/* ===== CLOSE ===== */

window.closeModal = function(){

document.getElementById("modal").style.display="none";

}

/* ===== SAVE ===== */

window.saveCar = async function(){

let name =
document.getElementById("name").value;

let price =
document.getElementById("price").value;

let year =
document.getElementById("year").value;

let files =
document.getElementById("fileUpload").files;

if(!name || !price || !year || files.length===0){

alert("Completa todo");

return;

}

let imgs = [];

for(let file of files){

let storageRef = sRef(
storage,
"cars/"+Date.now()+"-"+file.name
);

await uploadBytes(storageRef,file);

let url = await getDownloadURL(storageRef);

imgs.push(url);

}

if(editKey){

await update(ref(db,"cars/"+editKey),{

name,
price,
year,
imgs

});

editKey = null;

}else{

await push(carsRef,{

name,
price,
year,
imgs

});

}

clearForm();

alert("Carro guardado");

}

/* ===== EDIT ===== */

window.editCar = function(i){

let car = cars[i];

editKey = currentKeys[i];

document.getElementById("name").value = car.name;

document.getElementById("price").value = car.price;

document.getElementById("year").value = car.year;

document.getElementById("adminPanel")
.style.display="block";

closeModal();

}

/* ===== DELETE ===== */

window.deleteCar = async function(i){

if(confirm("Borrar carro?")){

await remove(ref(db,"cars/"+currentKeys[i]));

closeModal();

}

}

/* ===== CLEAR ===== */

function clearForm(){

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("year").value="";
document.getElementById("fileUpload").value="";

}

/* ===== SECRET ADMIN ===== */

let clicks = 0;

document.getElementById("secret").onclick = ()=>{

clicks++;

if(clicks>=5){

let pass = prompt("Password");

if(pass==="Khloe070304"){

document.getElementById("adminPanel")
.style.display="block";

}else{

alert("Incorrecto");

}

clicks=0;

}

};

</script>

</body>
</html>
