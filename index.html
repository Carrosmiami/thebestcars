<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Best Cars Miami</title>

<link rel="icon"
href="ChatGPT%20Image%2020%20may%202026,%2017_26_46.png">

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.92),rgba(0,0,0,0.96)),
url('ChatGPT%20Image%2020%20may%202026,%2017_26_46.png');

background-size:500px;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
}

/* HEADER */

header{

background:linear-gradient(90deg,#000814,#001d3d);

padding:35px;

text-align:center;

box-shadow:0 4px 25px rgba(0,255,255,0.2);

border-bottom:1px solid rgba(255,255,255,0.1);

}

/* TITLE */

header h1{

cursor:pointer;

font-size:55px;

font-weight:900;

letter-spacing:2px;

text-transform:uppercase;

margin:20px 0;

font-family:Arial Black,sans-serif;

display:flex;

align-items:center;

justify-content:center;

gap:15px;

color:white;

text-shadow:
0 0 10px rgba(0,255,255,0.8),
0 0 20px rgba(0,255,255,0.6),
0 0 40px rgba(0,255,255,0.4);

}

/* LOGO */

.logo{

width:110px;

height:110px;

object-fit:contain;

filter:
drop-shadow(0 0 10px cyan)
drop-shadow(0 0 20px cyan);

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

transform:scale(1);

filter:
drop-shadow(0 0 10px cyan)
drop-shadow(0 0 20px cyan);

}

to{

transform:scale(1.05);

filter:
drop-shadow(0 0 20px #00e5ff)
drop-shadow(0 0 40px #00ff99);

}

}

/* SEARCH */

.controls{

padding:20px;

text-align:center;

}

input{

padding:14px;

border:none;

border-radius:10px;

width:80%;

max-width:320px;

background:#111827;

color:white;

font-size:15px;

outline:none;

box-shadow:0 0 10px rgba(0,255,255,0.1);

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

padding:20px;

}

/* CARD */

.card{

background:#151b2e;

border-radius:15px;

overflow:hidden;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 15px rgba(0,0,0,0.4);

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 0 25px rgba(0,255,255,0.3);

}

.card img{

width:100%;

height:220px;

object-fit:cover;

}

/* INFO */

.info{

padding:15px;

}

.info h3{

margin:0;

font-size:22px;

}

.price{

color:#00ff99;

font-weight:bold;

font-size:20px;

}

/* MODAL */

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.96);

overflow:auto;

z-index:999;

}

.modal-content{

background:#111827;

margin:40px auto;

padding:20px;

width:90%;

max-width:750px;

border-radius:15px;

box-shadow:0 0 30px rgba(0,255,255,0.2);

}

/* CLOSE */

.close{

float:right;

font-size:30px;

cursor:pointer;

color:red;

}

/* SLIDER */

.slider img{

width:100%;

margin-bottom:12px;

border-radius:12px;

}

/* BUTTONS */

.btn{

display:block;

text-align:center;

padding:14px;

border-radius:10px;

margin-top:12px;

text-decoration:none;

color:white;

cursor:pointer;

border:none;

font-weight:bold;

font-size:15px;

transition:0.3s;

}

.btn:hover{

opacity:0.85;

transform:scale(1.02);

}

.whatsapp{

background:#25D366;

}

.edit{

background:#1e88e5;

}

.delete{

background:#e53935;

}

.add{

background:#ff9800;

}

/* ADMIN */

#adminPanel{

display:none;

position:fixed;

bottom:20px;

right:20px;

background:#111827;

padding:20px;

border-radius:15px;

width:300px;

z-index:1000;

box-shadow:0 0 25px rgba(0,255,255,0.2);

}

#adminPanel h3{

text-align:center;

}

#adminPanel input{

width:100%;

margin-bottom:10px;

}

</style>

</head>

<body>

<header>

<h1 id="secret">

<img
src="ChatGPT%20Image%2020%20may%202026,%2017_26_46.png"
class="logo">

<span>The Best Cars Miami</span>

</h1>

</header>

<div class="controls">

<input
id="search"
placeholder="Buscar carro..."
onkeyup="render()">

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<span
class="close"
onclick="closeModal()">

✖

</span>

<div id="modalBody"></div>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<h3>🔒 Admin Panel</h3>

<input id="name" placeholder="Nombre">

<input id="price" placeholder="Precio">

<input id="year" placeholder="Año">

<input
id="imgs"
placeholder="Fotos URL1,URL2,URL3">

<button
class="btn add"
onclick="saveCar()">

Guardar Carro

</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
push,
onValue,
remove,
update

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:
"AIzaSyB7yKOWqufXFKD7j_QOLXazwJ3T4rL5fkE",

authDomain:
"thebestcars-miami.firebaseapp.com",

databaseURL:
"https://thebestcars-miami-default-rtdb.firebaseio.com",

projectId:
"thebestcars-miami",

storageBucket:
"thebestcars-miami.firebasestorage.app",

messagingSenderId:
"323195561825",

appId:
"1:323195561825:web:f48bc075e99ba152c40720",

measurementId:
"G-G4MN1SBMT6"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const carsRef = ref(db,"cars");

let cars = [];

let currentKeys = [];

let editKey = null;

/* REALTIME */

onValue(carsRef,(snapshot)=>{

cars = [];

currentKeys = [];

snapshot.forEach(child=>{

cars.push(child.val());

currentKeys.push(child.key);

});

render();

});

/* RENDER */

window.render = function(){

let grid =
document.getElementById("grid");

let search =
document.getElementById("search")
.value
.toLowerCase();

grid.innerHTML = "";

cars

.filter(car=>

car.name
.toLowerCase()
.includes(search)

)

.forEach((car,i)=>{

grid.innerHTML += `

<div class="card"
onclick="openCar(${i})">

<img src="${car.imgs[0]}">

<div class="info">

<h3>${car.name}</h3>

<p>Año: ${car.year}</p>

<p class="price">

$${car.price}

</p>

</div>

</div>

`;

});

}

/* OPEN CAR */

window.openCar = function(i){

let car = cars[i];

let imgs =

car.imgs

.map(img=>

`<img src="${img}">`

)

.join("");

document.getElementById("modalBody")

.innerHTML = `

<h2>${car.name}</h2>

<p class="price">

$${car.price}

</p>

<p>Año: ${car.year}</p>

<div class="slider">

${imgs}

</div>

<a
class="btn whatsapp"
href="https://wa.me/13050000000">

WhatsApp

</a>

<button
class="btn edit"
onclick="editCar(${i})">

✏ Editar

</button>

<button
class="btn delete"
onclick="deleteCar(${i})">

🗑 Borrar

</button>

`;

document.getElementById("modal")

.style.display = "block";

}

/* CLOSE */

window.closeModal = function(){

document.getElementById("modal")

.style.display = "none";

}

/* SAVE */

window.saveCar = async function(){

let name =
document.getElementById("name").value;

let price =
document.getElementById("price").value;

let year =
document.getElementById("year").value;

let imgs =

document.getElementById("imgs")

.value

.split(",")

.map(x=>x.trim());

if(

!name ||
!price ||
!year ||
imgs.length===0

){

alert("Completa todo");

return;

}

/* EDIT */

if(editKey){

await update(

ref(db,"cars/"+editKey),

{
name,
price,
year,
imgs
}

);

editKey = null;

}

/* NEW */

else{

await push(

carsRef,

{
name,
price,
year,
imgs
}

);

}

clearForm();

alert("Guardado");

}

/* EDIT CAR */

window.editCar = function(i){

let car = cars[i];

editKey = currentKeys[i];

document.getElementById("name").value =
car.name;

document.getElementById("price").value =
car.price;

document.getElementById("year").value =
car.year;

document.getElementById("imgs").value =
car.imgs.join(",");

document.getElementById("adminPanel")

.style.display = "block";

closeModal();

}

/* DELETE */

window.deleteCar = async function(i){

if(confirm("Borrar carro?")){

await remove(

ref(db,"cars/"+currentKeys[i])

);

closeModal();

}

}

/* CLEAR */

function clearForm(){

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("year").value="";
document.getElementById("imgs").value="";

}

/* SECRET ADMIN */

let clicks = 0;

document.getElementById("secret")

.onclick = ()=>{

clicks++;

if(clicks>=5){

let pass = prompt("Password");

if(pass==="Khloe070304"){

document.getElementById("adminPanel")

.style.display = "block";

}

else{

alert("Incorrecto");

}

clicks = 0;

}

};

</script>

</body>
</html>
