<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Best Cars Miami</title>

<link rel="icon" type="image/png" href="ChatGPT Image 20 may 2026, 17_26_46.png">

<style>

body{
margin:0;
font-family:Arial;
background:#050b16;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
position:relative;
padding:35px 20px;
text-align:center;
background:linear-gradient(90deg,#000814,#001d3d);
overflow:hidden;
}

header::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("ChatGPT Image 20 may 2026, 17_26_46.png") center center no-repeat;
background-size:350px;
opacity:0.08;
}

.logo{
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
margin-right:15px;
box-shadow:0 0 25px rgba(0,255,255,0.6);
}

.titleWrap{
position:relative;
z-index:2;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

header h1{
font-size:60px;
font-weight:900;
margin:0;
text-transform:uppercase;
letter-spacing:2px;
font-family:Arial Black,sans-serif;

background:linear-gradient(90deg,#00e5ff,#ffffff,#00ffcc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(0,255,255,0.9),
0 0 20px rgba(0,255,255,0.7),
0 0 40px rgba(0,255,255,0.5);
}

/* CONTROLS */

.controls{
padding:20px;
text-align:center;
background:#08111f;
}

.langBtn{
background:#00e5ff;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,229,255,0.5);
}

input{
width:90%;
max-width:350px;
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:16px;
outline:none;
box-shadow:0 0 12px rgba(0,255,255,0.2);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:25px;
}

.card{
background:#101826;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
margin:0;
font-size:22px;
}

.price{
color:#00ff99;
font-weight:bold;
font-size:20px;
margin-top:10px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:999;
overflow:auto;
}

.modal-content{
background:#111827;
margin:40px auto;
padding:20px;
width:90%;
max-width:750px;
border-radius:20px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
color:red;
}

.slider img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.btn{
display:block;
padding:14px;
margin-top:10px;
border-radius:10px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

.whatsapp{
background:#25D366;
}

.call{
background:#00b0ff;
}

.edit{
background:#1e88e5;
}

.delete{
background:#e53935;
}

.add{
background:#ff9800;
}

/* ADMIN PANEL */

#adminPanel{
display:none;
position:fixed;
right:20px;
bottom:20px;
width:300px;
background:#111827;
padding:20px;
border-radius:15px;
z-index:1000;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

#adminPanel h3{
margin-top:0;
text-align:center;
}

#adminPanel input{
width:100%;
margin-bottom:10px;
}

.fileText{
font-size:13px;
opacity:0.7;
margin-top:-5px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>

<div class="titleWrap">

<img src="ChatGPT Image 20 may 2026, 17_26_46.png" class="logo">

<h1 id="secret">
THE BEST CARS MIAMI
</h1>

</div>

</header>

<div class="controls">

<button class="langBtn" onclick="toggleLang()">
🌎 English / Español
</button>

<br>

<input id="search" placeholder="Buscar carro..." onkeyup="render()">

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="modalBody"></div>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<h3>🔒 Admin Panel</h3>

<input id="name" placeholder="Nombre">

<input id="price" placeholder="Precio">

<input id="year" placeholder="Año">

<input type="file" id="fileInput" multiple accept="image/*">

<div class="fileText">
Selecciona fotos desde tu galería
</div>

<input id="imgs" placeholder="O pega URLs separadas por coma">

<button class="btn add" onclick="saveCar()">
Guardar Carro
</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyB7yKOWqufXFKD7j_QOLXazwJ3T4rL5fkE",

authDomain: "thebestcars-miami.firebaseapp.com",

databaseURL: "https://thebestcars-miami-default-rtdb.firebaseio.com",

projectId: "thebestcars-miami",

storageBucket: "thebestcars-miami.firebasestorage.app",

messagingSenderId: "323195561825",

appId: "1:323195561825:web:f48bc075e99ba152c40720",

measurementId: "G-G4MN1SBMT6"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const carsRef = ref(db,"cars");

let cars = [];
let currentKeys = [];
let editKey = null;

/* LOAD */

onValue(carsRef,(snapshot)=>{

cars = [];
currentKeys = [];

snapshot.forEach(child=>{

cars.push(child.val());
currentKeys.push(child.key);

});

render();

});

/* RENDER */

window.render = function(){

let search = document
.getElementById("search")
.value
.toLowerCase();

let grid = document.getElementById("grid");

grid.innerHTML = "";

cars
.filter(car=>car.name.toLowerCase().includes(search))
.forEach((car,i)=>{

grid.innerHTML += `

<div class="card" onclick="openCar(${i})">

<img src="${car.imgs[0]}">

<div class="info">

<h3>${car.name}</h3>

<p>Año: ${car.year}</p>

<p class="price">$${car.price}</p>

</div>

</div>

`;

});

}

/* OPEN */

window.openCar = function(i){

let car = cars[i];

let imgs = car.imgs
.map(img=>`<img src="${img}">`)
.join("");

document.getElementById("modalBody").innerHTML = `

<h2>${car.name}</h2>

<p class="price">$${car.price}</p>

<p>Año: ${car.year}</p>

<div class="slider">
${imgs}
</div>

<a class="btn whatsapp"
href="https://wa.me/17542141799"
target="_blank">

📱 WhatsApp

</a>

<a class="btn call"
href="tel:+17542141799">

📞 Llamar Ahora

</a>

`;

document.getElementById("modal").style.display="block";

}

/* CLOSE */

window.closeModal = function(){

document.getElementById("modal").style.display="none";

}

/* SAVE */

window.saveCar = async function(){

let name = document.getElementById("name").value;

let price = document.getElementById("price").value;

let year = document.getElementById("year").value;

let imgsInput = document.getElementById("imgs").value;

let imgs = [];

if(imgsInput.trim() !== ""){

imgs = imgsInput
.split(",")
.map(x=>x.trim());

}

const files = document.getElementById("fileInput").files;

for(let file of files){

let reader = new FileReader();

await new Promise(resolve=>{

reader.onload = function(e){

imgs.push(e.target.result);

resolve();

};

reader.readAsDataURL(file);

});

}

if(!name || !price || !year || imgs.length===0){

alert("Completa todo");
return;

}

if(editKey){

await update(ref(db,"cars/"+editKey),{

name,
price,
year,
imgs

});

editKey = null;

}else{

await push(carsRef,{

name,
price,
year,
imgs

});

}

clearForm();

alert("Guardado");

}

/* DELETE */

window.deleteCar = async function(i){

if(confirm("Borrar carro?")){

await remove(ref(db,"cars/"+currentKeys[i]));

closeModal();

}

}

/* CLEAR */

function clearForm(){

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("year").value="";
document.getElementById("imgs").value="";
document.getElementById("fileInput").value="";

}

/* SECRET ADMIN */

let clicks = 0;

document.getElementById("secret").onclick = ()=>{

clicks++;

if(clicks >= 5){

let pass = prompt("Password");

if(pass === "Khloe070304"){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Incorrecto");

}

clicks = 0;

}

}

/* LANG */

let english = false;

window.toggleLang = function(){

english = !english;

if(english){

document.getElementById("search")
.placeholder = "Search car...";

}else{

document.getElementById("search")
.placeholder = "Buscar carro...";

}

}

</script>

</body>
</html>
