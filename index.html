<body>

<header>

<img
src="ChatGPT Image 20 may 2026, 17_26_46.png"
class="logo"
>

<h1 id="secret">
THE BEST CARS MIAMI
</h1>

</header>

<div class="controls">

<input
id="search"
placeholder="Buscar carro..."
onkeyup="render()"
>

</div>

<div class="grid" id="grid"></div>

<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="modalBody"></div>

</div>

</div>

<div id="adminPanel">

<h3>🔒 Admin Panel</h3>

<input id="name" placeholder="Nombre">

<input id="price" placeholder="Precio">

<input id="year" placeholder="Año">

<input type="file" id="fileInput" multiple accept="image/*">

<button class="btn add" onclick="saveCar()">
Guardar Carro
</button>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
push,
onValue,
remove,
update

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {

getStorage,
ref as storageRef,
uploadBytes,
getDownloadURL

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyB7yKOWqufXFKD7j_QOLXazwJ3T4rL5fkE",

authDomain: "thebestcars-miami.firebaseapp.com",

databaseURL: "https://thebestcars-miami-default-rtdb.firebaseio.com",

projectId: "thebestcars-miami",

storageBucket: "thebestcars-miami.appspot.com",

messagingSenderId: "323195561825",

appId: "1:323195561825:web:f48bc075e99ba152c40720"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

const carsRef = ref(db,"cars");

let cars = [];
let currentKeys = [];
let editKey = null;
let isAdmin = false;

onValue(carsRef,(snapshot)=>{

cars = [];
currentKeys = [];

snapshot.forEach(child=>{

cars.push(child.val());
currentKeys.push(child.key);

});

render();

});

window.render = function(){

let grid = document.getElementById("grid");

let search = document.getElementById("search")
.value
.toLowerCase();

grid.innerHTML = "";

cars
.filter(car=>car.name.toLowerCase().includes(search))
.forEach((car,i)=>{

grid.innerHTML += `

<div class="card" onclick="openCar(${i})">

<img src="${car.imgs[0]}">

<div class="info">

<h3>${car.name}</h3>

<p>Año: ${car.year}</p>

<p class="price">$${car.price}</p>

</div>

</div>

`;

});

}

window.openCar = function(i){

let car = cars[i];

let imgs = car.imgs
.map(img=>`<img src="${img}">`)
.join("");

document.getElementById("modalBody").innerHTML = `

<h2>${car.name}</h2>

<br>

<p class="price">$${car.price}</p>

<br>

<div class="slider">

${imgs}

</div>

<a
class="btn whatsapp"
href="https://wa.me/13050000000"
target="_blank"
>

WhatsApp

</a>

${isAdmin ? `

<button class="btn edit" onclick="editCar(${i})">

✏ Editar

</button>

<button class="btn delete" onclick="deleteCar(${i})">

🗑 Borrar

</button>

` : ""}

`;

document.getElementById("modal").style.display="block";

}

window.closeModal = function(){

document.getElementById("modal").style.display="none";

}

window.saveCar = async function(){

let name = document.getElementById("name").value;

let price = document.getElementById("price").value;

let year = document.getElementById("year").value;

let files = document.getElementById("fileInput").files;

if(!name || !price || !year || files.length===0){

alert("Completa todo");

return;

}

let imgs = [];

for(let file of files){

let imgRef = storageRef(
storage,
"cars/"+Date.now()+file.name
);

await uploadBytes(imgRef,file);

let url = await getDownloadURL(imgRef);

imgs.push(url);

}

if(editKey){

await update(ref(db,"cars/"+editKey),{

name,
price,
year,
imgs

});

editKey = null;

}else{

await push(carsRef,{

name,
price,
year,
imgs

});

}

clearForm();

alert("Carro guardado");

}

window.editCar = function(i){

let car = cars[i];

editKey = currentKeys[i];

document.getElementById("name").value = car.name;

document.getElementById("price").value = car.price;

document.getElementById("year").value = car.year;

document.getElementById("adminPanel").style.display="block";

closeModal();

}

window.deleteCar = async function(i){

if(confirm("Borrar carro?")){

await remove(ref(db,"cars/"+currentKeys[i]));

closeModal();

}

}

function clearForm(){

document.getElementById("name").value="";

document.getElementById("price").value="";

document.getElementById("year").value="";

document.getElementById("fileInput").value="";

}

let clicks = 0;

document.getElementById("secret").onclick = ()=>{

clicks++;

if(clicks>=5){

let pass = prompt("Password");

if(pass==="Khloe070304"){

isAdmin = true;

document.getElementById("adminPanel").style.display="block";

render();

}else{

alert("Incorrecto");

}

clicks=0;

}

};

</script>

</body>
