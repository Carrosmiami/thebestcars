<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Best Cars Miami</title>

<link rel="icon" type="image/png" href="ChatGPT Image 20 may 2026, 17_26_46.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050b16;
color:white;
min-height:100vh;
background-image:url("ChatGPT Image 20 may 2026, 17_26_46.png");
background-repeat:no-repeat;
background-position:center center;
background-size:cover;
background-attachment:fixed;
}

/* HEADER */

header{
background:linear-gradient(90deg,#000814,#001d3d);
padding:30px 20px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
box-shadow:0 4px 30px rgba(0,255,255,0.25);
border-bottom:1px solid rgba(255,255,255,0.08);
flex-wrap:wrap;
}

.logo{
width:95px;
height:95px;
object-fit:contain;
border-radius:14px;
box-shadow:
0 0 15px rgba(0,255,255,0.7),
0 0 35px rgba(0,255,255,0.3);
}

header h1{
font-size:55px;
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
background:linear-gradient(90deg,#00e5ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 10px rgba(0,255,255,0.8),
0 0 25px rgba(0,255,255,0.7),
0 0 50px rgba(0,255,255,0.4);
font-family:Arial Black,sans-serif;
cursor:pointer;
}

/* SEARCH */

.controls{
padding:25px;
display:flex;
justify-content:center;
}

.controls input{
width:100%;
max-width:400px;
padding:15px;
border:none;
border-radius:12px;
background:#091426;
color:white;
font-size:16px;
outline:none;
box-shadow:0 0 15px rgba(0,255,255,0.15);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(10,15,25,0.95);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(0,0,0,0.5);
backdrop-filter:blur(5px);
}

.card:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 25px rgba(0,255,255,0.35);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
font-size:24px;
margin-bottom:10px;
}

.info p{
margin-bottom:5px;
}

.price{
color:#00ff99;
font-size:22px;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
overflow:auto;
z-index:999;
padding:20px;
}

.modal-content{
background:#0e1624;
max-width:850px;
margin:auto;
padding:25px;
border-radius:20px;
position:relative;
box-shadow:0 0 35px rgba(0,255,255,0.2);
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:28px;
cursor:pointer;
color:red;
}

.slider img{
width:100%;
margin-bottom:15px;
border-radius:14px;
}

/* BUTTONS */

.btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
color:white;
transition:0.2s;
}

.btn:hover{
opacity:0.9;
transform:scale(1.01);
}

.whatsapp{
background:#25D366;
}

.edit{
background:#1e88e5;
}

.delete{
background:#e53935;
}

.add{
background:#ff9800;
}

/* ADMIN */

#adminPanel{
display:none;
position:fixed;
bottom:20px;
right:20px;
background:#0d1525;
padding:20px;
border-radius:16px;
width:320px;
z-index:1000;
box-shadow:0 0 30px rgba(0,0,0,0.7);
}

#adminPanel h3{
margin-bottom:15px;
}

#adminPanel input{
width:100%;
margin-bottom:10px;
padding:12px;
border:none;
border-radius:10px;
background:#111c31;
color:white;
}

#adminPanel input[type="file"]{
padding:8px;
background:#111;
}

/* MOBILE */

@media(max-width:768px){

header{
flex-direction:column;
}

header h1{
font-size:34px;
text-align:center;
}

.logo{
width:80px;
height:80px;
}

}

</style>
</head>

<body>

<header>

<img src="ChatGPT Image 20 may 2026, 17_26_46.png" class="logo">

<h1 id="secret">
THE BEST CARS MIAMI
</h1>

</header>

<div class="controls">

<input
id="search"
placeholder="Buscar carro..."
onkeyup="render()"
>

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="modalBody"></div>

</div>

</div>

<!-- ADMIN -->

<div id="adminPanel">

<h3>🔒 Admin Panel</h3>

<input id="name" placeholder="Nombre del carro">

<input id="price" placeholder="Precio">

<input id="year" placeholder="Año">

<input type="file" id="fileInput" multiple accept="image/*">

<button class="btn add" onclick="saveCar()">
Guardar Carro
</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
push,
onValue,
remove,
update

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyB7yKOWqufXFKD7j_QOLXazwJ3T4rL5fkE",

authDomain: "thebestcars-miami.firebaseapp.com",

databaseURL: "https://thebestcars-miami-default-rtdb.firebaseio.com",

projectId: "thebestcars-miami",

storageBucket: "thebestcars-miami.firebasestorage.app",

messagingSenderId: "323195561825",

appId: "1:323195561825:web:f48bc075e99ba152c40720",

measurementId: "G-G4MN1SBMT6"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let cars = [];
let currentKeys = [];
let editKey = null;

const carsRef = ref(db,"cars");

onValue(carsRef,(snapshot)=>{

cars = [];
currentKeys = [];

snapshot.forEach(child=>{

cars.push(child.val());
currentKeys.push(child.key);

});

render();

});

window.render = function(){

let grid = document.getElementById("grid");

let search = document.getElementById("search")
.value
.toLowerCase();

grid.innerHTML = "";

cars
.filter(car =>
car.name.toLowerCase().includes(search)
)

.forEach((car,i)=>{

grid.innerHTML += `

<div class="card" onclick="openCar(${i})">

<img src="${car.imgs[0]}">

<div class="info">

<h3>${car.name}</h3>

<p>Año: ${car.year}</p>

<p class="price">$${car.price}</p>

</div>

</div>

`;

});

}

window.openCar = function(i){

let car = cars[i];

let imgs = car.imgs
.map(img => `<img src="${img}">`)
.join("");

document.getElementById("modalBody").innerHTML = `

<h2>${car.name}</h2>

<br>

<p class="price">$${car.price}</p>

<br>

<div class="slider">

${imgs}

</div>

<a
class="btn whatsapp"
href="https://wa.me/13050000000"
target="_blank"
>

WhatsApp

</a>

<button
class="btn edit"
onclick="editCar(${i})"
>

✏ Editar

</button>

<button
class="btn delete"
onclick="deleteCar(${i})"
>

🗑 Borrar

</button>

`;

document.getElementById("modal").style.display="block";

}

window.closeModal = function(){

document.getElementById("modal").style.display="none";

}

window.saveCar = async function(){

let name = document.getElementById("name").value;

let price = document.getElementById("price").value;

let year = document.getElementById("year").value;

let files = document.getElementById("fileInput").files;

if(!name || !price || !year || files.length===0){

alert("Completa todo");

return;

}

let imgs = [];

for(let file of files){

imgs.push(URL.createObjectURL(file));

}

if(editKey){

await update(ref(db,"cars/"+editKey),{

name,
price,
year,
imgs

});

editKey = null;

}else{

await push(carsRef,{

name,
price,
year,
imgs

});

}

clearForm();

alert("Carro guardado");

}

window.editCar = function(i){

let car = cars[i];

editKey = currentKeys[i];

document.getElementById("name").value = car.name;

document.getElementById("price").value = car.price;

document.getElementById("year").value = car.year;

document.getElementById("adminPanel").style.display="block";

closeModal();

}

window.deleteCar = async function(i){

if(confirm("Borrar carro?")){

await remove(ref(db,"cars/"+currentKeys[i]));

closeModal();

}

}

function clearForm(){

document.getElementById("name").value = "";

document.getElementById("price").value = "";

document.getElementById("year").value = "";

document.getElementById("fileInput").value = "";

}

let clicks = 0;

document.getElementById("secret").onclick = ()=>{

clicks++;

if(clicks>=5){

let pass = prompt("Password");

if(pass==="Khloe070304"){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Incorrecto");

}

clicks=0;

}

};

</script>

</body>
</html>
